# ==============================================================================
# Web Traffic Analysis Pipeline - Infrastructure Orchestration
# ==============================================================================
#
# Services:
#   - Zookeeper: Kafka coordination
#   - Kafka:     Event broker (source)
#   - ClickHouse: OLAP analytical database (sink)
#   - Spark Master: Distributed streaming processor
#
# Usage:
#   1. Create deploy/.env with CLICKHOUSE_USER and CLICKHOUSE_PASSWORD
#   2. Run: docker-compose up -d
# ==============================================================================

version: '3.8'

services:

  # ----------------------------------------------------------------------------
  # Zookeeper - Kafka coordination
  # ----------------------------------------------------------------------------
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - analytics-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Kafka - Event streaming broker
  #   INTERNAL://kafka:29092  -> container-to-container (Spark)
  #   EXTERNAL://localhost:9092 -> host machine (producer scripts)
  # ----------------------------------------------------------------------------
  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CREATE_TOPICS: "events:1:1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Retain messages for 2 hours (enough for dev/test replay)
      KAFKA_LOG_RETENTION_HOURS: 2
      KAFKA_LOG_SEGMENT_BYTES: 536870912  # 512MB max segment size
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - analytics-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------------------------
  # ClickHouse - OLAP analytical database
  #   Port 8123: HTTP interface (JDBC, REST API)
  #   Port 9000: Native TCP protocol
  #
  # NOTE: CLICKHOUSE_DB in environment only sets the default DB shown in the
  # client - tables are created in 'default' database by init-clickhouse.ps1.
  # The stream_processor.py connects to 'default' via JDBC.
  # ----------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.3   # Pin to stable LTS version
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init-ch.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - analytics-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Spark Master - Job orchestrator (local mode)
  #   Web UI:  http://localhost:8081
  #   Submit:  spark://localhost:7077
  #
  # spark_jobs/ is mounted at /opt/spark-apps inside the container.
  # The clickhouse-jdbc-0.6.4-shaded.jar must be present in spark_jobs/.
  # ----------------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.0
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_PUBLIC_DNS: localhost
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "8081:8080"   # Spark Web UI
      - "7077:7077"   # Cluster submission
    volumes:
      - ../spark_jobs:/opt/spark-apps
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - analytics-net
    restart: unless-stopped

# ------------------------------------------------------------------------------
# Networks & Volumes
# ------------------------------------------------------------------------------
networks:
  analytics-net:
    driver: bridge

volumes:
  clickhouse_data: