# Services:
#   - Kafka:     Event broker (source)
#   - ClickHouse: OLAP analytical database (sink)
#   - Spark Master: Distributed streaming processor
#
# Usage:
#   1. Create deploy/.env with CLICKHOUSE_USER and CLICKHOUSE_PASSWORD
#   2. Run: docker-compose up -d

services:
  # Kafka - Event streaming broker in KRaft mode (no Zookeeper)
  #   INTERNAL://kafka:29092  -> container-to-container (Spark)
  #   EXTERNAL://localhost:9092 -> host machine (producer scripts)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 2
      KAFKA_LOG_SEGMENT_BYTES: 536870912
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - analytics-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ClickHouse - OLAP analytical database
  #   Port 8123: HTTP interface (JDBC, REST API)
  #   Port 9000: Native TCP protocol
  clickhouse:
    image: clickhouse/clickhouse-server:24.3 
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init-ch.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - analytics-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spark Master - Job orchestrator
  #   Web UI:  http://localhost:8081
  #   Submit:  spark://localhost:7077
  spark-master:
    image: apache/spark:3.5.0
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_PUBLIC_DNS: localhost
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "8081:8080"   # Spark Web UI
      - "7077:7077"   # Cluster submission
    volumes:
      - ../spark_jobs:/opt/spark-apps
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - analytics-net
    restart: unless-stopped

# Networks & Volumes
networks:
  analytics-net:
    driver: bridge

volumes:
  clickhouse_data:
  kafka_data: